{% extends "layout/base.html" %}
{% load static %}

{% block content %}

<h1 class="sr-only">Elf</h1>
<div class="flex flex-col items-center justify-center w-full h-full">
	<h2 id="my-lists">My Lists</h2>
	{% for list in owned_lists %}
		<div data-list-id="{{ list.pk }}">{{ list }}</div>
	{% endfor %}

	<h2 id="shared-lists">Shared With Me</h2>
	{% for list in shared_lists %}
		<div data-list-id="{{ list.pk }}">{{ list }}</div>
	{% endfor %}
</div>

{% endblock %}
