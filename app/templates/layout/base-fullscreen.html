{% load static %} {% load icons %}
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="{% static 'build/css/tailwind.css' %}" />
		<script defer src="{% static 'build/js/global/index.js' %}"></script>
		<link rel="icon" href="{% static 'img/favicon.png' %}" />
		<title>{% block page_title %}elf{% endblock page_title %}</title>

		{% block head %}
		{% endblock head %}
	</head>

	<body class="flex flex-col font-sans">
        {% block body %}

        {% endblock body %}
	</body>
</html>
